<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Расписание Гитарника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e1a;
            min-height: 100vh;
            padding: 40px 20px;
            color: #f0f0f5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ШАПКА */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffd866;
        }

        .header p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ПОИСК */
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            max-width: 480px;
            padding: 14px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #f0f0f5;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .search-box input:focus {
            border-color: #ffd86666;
            background: rgba(255, 255, 255, 0.07);
        }

        /* КАРТОЧКИ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px 24px;
            cursor: pointer;
            transition: 0.25s;
        }

        .card:hover {
            background: rgba(255, 215, 0, 0.05);
            border-color: #ffd86644;
            transform: translateY(-3px);
        }

        .card .name {
            font-size: 18px;
            font-weight: 600;
            color: #ffd866;
        }

        .card .count {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 6px;
        }

        .card .badge {
            font-size: 12px;
            color: #ffd86655;
            margin-left: 8px;
        }

        /* КНОПКА НАЗАД */
        .back {
            display: inline-block;
            margin: 10px 0 20px;
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.06);
            color: #ffd866;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .back:hover {
            background: rgba(255, 215, 0, 0.14);
        }

        /* ПЕСНИ */
        .song {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #ffd86633;
            padding: 14px 20px;
            margin-bottom: 10px;
            border-radius: 0 14px 14px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .song:hover {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: #ffd866;
        }

        .song .title {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        .song .author {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        /* ТЕКСТ ПЕСНИ */
        .lyrics-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 35px;
            margin-top: 10px;
        }

        .lyrics-box .big-title {
            font-size: 28px;
            color: #ffd866;
            font-weight: 600;
        }

        .lyrics-box .big-author {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            margin: 4px 0 20px;
        }

        .lyrics-box .text {
            font-size: 17px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.8);
            white-space: pre-wrap;
            font-family: Georgia, serif;
        }

        /* СТРАНИЦЫ */
        .page {
            display: block;
        }

        .page.hidden {
            display: none;
        }

        /* СТАТИСТИКА */
        .stats {
            text-align: center;
            color: rgba(255, 255, 255, 0.08);
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 30px;
        }

        /* ЗАГРУЗКА */
        .loader {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.15);
        }

        .loader .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 215, 0, 0.08);
            border-top-color: #ffd866;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ОШИБКА */
        .error {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 120, 120, 0.6);
            font-size: 15px;
            line-height: 1.8;
        }

        .error code {
            color: #ffd86688;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* АДАПТИВ */
        @media (max-width: 550px) {
            .header h1 {
                font-size: 26px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .lyrics-box {
                padding: 20px;
            }
            .lyrics-box .big-title {
                font-size: 22px;
            }
        }

        .fade {
            animation: fade 0.3s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- ШАПКА -->
        <div class="header">
            <h1>✦ РАСПИСАНИЕ ГИТАРНИКА ✦</h1>
            <p>Вечер выступлений</p>
        </div>

        <!-- ПОИСК -->
        <div class="search-box" id="searchBox">
            <input type="text" id="searchInput" placeholder="Найти исполнителя..." oninput="applyFilter()" />
        </div>

        <!-- СТРАНИЦА: СПИСОК ИСПОЛНИТЕЛЕЙ -->
        <div id="pageMain" class="page">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                Загрузка данных...
            </div>
            <div id="grid" class="grid" style="display:none;"></div>
            <div id="stats" class="stats"></div>
            <div id="error" class="error" style="display:none;"></div>
        </div>

        <!-- СТРАНИЦА: ПЕСНИ -->
        <div id="pageSongs" class="page hidden">
            <button class="back" onclick="goHome()">← Назад к списку</button>
            <div id="artistTitle" style="font-size:32px;color:#ffd866;font-weight:700;"></div>
            <div id="songsList"></div>
        </div>

        <!-- СТРАНИЦА: ТЕКСТ ПЕСНИ -->
        <div id="pageLyrics" class="page hidden">
            <button class="back" onclick="goToSongs()">← Назад к песням</button>
            <div class="lyrics-box fade">
                <div class="big-title" id="lyricTitle"></div>
                <div class="big-author" id="lyricAuthor"></div>
                <div class="text" id="lyricText"></div>
            </div>
        </div>

    </div>

    <script>
        // =============================================================
        // 1. ЗАГРУЗКА ДАННЫХ
        // =============================================================

        let artists = [];
        let songs = [];
        let currentArtistId = null;

        async function load() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('grid');
            const error = document.getElementById('error');

            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error('Файл data.json не найден (HTTP ' + res.status + ')');

                const data = await res.json();

                // Проверяем структуру
                if (!data.artists || !Array.isArray(data.artists)) {
                    throw new Error('В data.json нет массива "artists"');
                }
                if (!data.songs || !Array.isArray(data.songs)) {
                    throw new Error('В data.json нет массива "songs"');
                }

                artists = data.artists;
                songs = data.songs;

                // Привязываем песни к исполнителям
                artists.forEach(artist => {
                    artist.songList = songs.filter(s => s.artist_id === artist.id);
                });

                render();

                loader.style.display = 'none';
                grid.style.display = 'grid';

            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                error.style.display = 'block';
                error.innerHTML = `
                    ❌ Не удалось загрузить данные.<br><br>
                    Проверьте:<br>
                    1. Файл <code>data.json</code> лежит рядом с <code>index.html</code><br>
                    2. В <code>data.json</code> нет синтаксических ошибок<br>
                    3. Интернет-соединение<br><br>
                    <span style="color:rgba(255,255,255,0.15);font-size:13px;">${err.message}</span>
                `;
            }
        }

        // =============================================================
        // 2. ОТРИСОВКА
        // =============================================================

        function render(filter = '') {
            const grid = document.getElementById('grid');
            const stats = document.getElementById('stats');

            const filtered = artists.filter(a =>
                a.name.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                grid.innerHTML =
                `<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px;">Ничего не найдено</div>`;
                stats.textContent = '';
                return;
            }

            let html = '';
            filtered.forEach(a => {
                const count = a.songList ? a.songList.length : 0;
                const isGroup = a.name.includes('группа') || a.name.includes('ОМБ') ? '★' : '';
                html += `
                    <div class="card" onclick="openSongs(${a.id})">
                        <div class="name">${a.name} <span class="badge">${isGroup}</span></div>
                        <div class="count">${count} ${declension(count)}</div>
                    </div>
                `;
            });

            grid.innerHTML = html;

            const total = artists.reduce((sum, a) => sum + (a.songList ? a.songList.length : 0), 0);
            stats.textContent = `Всего исполнителей: ${artists.length}  ·  Песен: ${total}`;
        }

        function declension(n) {
            if (n === 1) return 'песня';
            if (n >= 2 && n <= 4) return 'песни';
            return 'песен';
        }

        function applyFilter() {
            const val = document.getElementById('searchInput').value;
            render(val);
        }

        // =============================================================
        // 3. НАВИГАЦИЯ
        // =============================================================

        function goHome() {
            document.getElementById('pageMain').classList.remove('hidden');
            document.getElementById('searchBox').style.display = 'block';
            document.getElementById('pageSongs').classList.add('hidden');
            document.getElementById('pageLyrics').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openSongs(artistId) {
            const artist = artists.find(a => a.id === artistId);
            if (!artist) return;

            currentArtistId = artistId;

            document.getElementById('pageMain').classList.add('hidden');
            document.getElementById('searchBox').style.display = 'none';
            document.getElementById('pageSongs').classList.remove('hidden');
            document.getElementById('pageLyrics').classList.add('hidden');

            document.getElementById('artistTitle').textContent = artist.name;

            const list = document.getElementById('songsList');
            if (!artist.songList || artist.songList.length === 0) {
                list.innerHTML = `<div style="color:rgba(255,255,255,0.15);padding:20px;">У этого исполнителя пока нет песен</div>`;
                return;
            }

            let html = '';
            artist.songList.forEach((s, i) => {
                html += `
                    <div class="song" onclick="openLyrics(${s.id})">
                        <div class="title">${i + 1}. ${s.title}</div>
                        <div class="author">${s.author}</div>
                    </div>
                `;
            });
            list.innerHTML = html;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToSongs() {
            document.getElementById('pageLyrics').classList.add('hidden');
            document.getElementById('pageSongs').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openLyrics(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;

            document.getElementById('pageSongs').classList.add('hidden');
            document.getElementById('pageLyrics').classList.remove('hidden');

            document.getElementById('lyricTitle').textContent = song.title;
            document.getElementById('lyricAuthor').textContent = song.author;
            document.getElementById('lyricText').textContent = '📝 Текст песни пока не добавлен.';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // =============================================================
        // 4. ЗАПУСК
        // =============================================================

        load();

        // Поиск по Enter
        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyFilter();
            }
        });
    </script>

</body>
</html>
