<html lang="ru">
<head>

    <title>Расписание Гитарника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e1a;
            min-height: 100vh;
            padding: 40px 20px;
            color: #f0f0f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffd866;
        }
        .header p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 480px;
            padding: 14px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #f0f0f5;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus {
            border-color: #ffd86666;
            background: rgba(255, 255, 255, 0.07);
        }
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .schedule {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px 24px;
            cursor: pointer;
            transition: 0.25s;
        }
        .row:hover {
            background: rgba(255, 215, 0, 0.04);
            border-color: #ffd86644;
            transform: translateX(4px);
        }

        .time {
            font-size: 20px;
            font-weight: 700;
            color: #ffd866;
            width: 80px;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        .name {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            flex: 1;
        }

        .badge {
            font-size: 13px;
            color: #ffd86655;
            margin-left: 10px;
        }

        .back {
            display: inline-block;
            margin: 10px 0 20px;
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.06);
            color: #ffd866;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }
        .back:hover {
            background: rgba(255, 215, 0, 0.14);
        }

        .song {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #ffd86633;
            padding: 14px 20px;
            margin-bottom: 10px;
            border-radius: 0 14px 14px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .song:hover {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: #ffd866;
        }
        .song .title {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }
        .song .author {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        .lyrics-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 35px;
            margin-top: 10px;
        }
        .lyrics-box .big-title {
            font-size: 28px;
            color: #ffd866;
            font-weight: 600;
        }
        .lyrics-box .big-author {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            margin: 4px 0 20px;
        }
        .lyrics-box .text {
            font-size: 17px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.8);
            white-space: pre-wrap;
            font-family: Georgia, serif;
            margin-bottom: 20px;
        }

        .page {
            display: block;
        }
        .page.hidden {
            display: none;
        }

        .fade {
            animation: fade 0.3s ease;
        }
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 550px) {
            .header h1 {
                font-size: 26px;
            }
            .row {
                flex-wrap: wrap;
                gap: 6px 12px;
            }
            .time {
                font-size: 18px;
                width: auto;
            }
            .lyrics-box {
                padding: 20px;
            }
            .lyrics-box .big-title {
                font-size: 22px;
            }
        }
    </style>

                container.innerHTML =

            });

            songs.forEach((s, i) => {
                html += `
                    <div class="song" onclick="openLyrics(${s.id})">
                        <div class="title">${i + 1}. ${s.title}</div>
                        <div class="author">${s.author}</div>
                    </div>
                `;
            });
            list.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToSongs() {
            document.getElementById('pageLyrics').classList.add('hidden');
            document.getElementById('pageSongs').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openLyrics(songId) {
            const song = SONGS.find(s => s.id === songId);
            if (!song) return;

            document.getElementById('pageSongs').classList.add('hidden');
            document.getElementById('pageLyrics').classList.remove('hidden');

            document.getElementById('lyricTitle').textContent = song.title;
            document.getElementById('lyricAuthor').textContent = song.author;

            const text = song.lyrics && song.lyrics.trim() !== '' ? song.lyrics : '📝 Текст пока не добавлен.';
            document.getElementById('lyricText').textContent = text;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // =============================================================
        // ЗАПУСК
        // =============================================================

        renderSchedule();

        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyFilter();
            }
        });
    </script>
</body>
</html>
