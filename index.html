<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Расписание Гитарника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e1a;
            min-height: 100vh;
            padding: 40px 20px;
            color: #f0f0f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffd866;
        }
        .header p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 480px;
            padding: 14px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #f0f0f5;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus {
            border-color: #ffd86666;
            background: rgba(255, 255, 255, 0.07);
        }
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* ===== РАСПИСАНИЕ ===== */
        .schedule {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px 24px;
            cursor: pointer;
            transition: 0.25s;
        }
        .row:hover {
            background: rgba(255, 215, 0, 0.04);
            border-color: #ffd86644;
            transform: translateX(4px);
        }

        .time {
            font-size: 20px;
            font-weight: 700;
            color: #ffd866;
            width: 80px;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        .name {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            flex: 1;
        }

        .badge {
            font-size: 13px;
            color: #ffd86655;
            margin-left: 10px;
        }

        /* ===== СТРАНИЦА ПЕСЕН ===== */
        .back {
            display: inline-block;
            margin: 10px 0 20px;
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.06);
            color: #ffd866;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
        }
        .back:hover {
            background: rgba(255, 215, 0, 0.14);
        }

        .song {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #ffd86633;
            padding: 14px 20px;
            margin-bottom: 10px;
            border-radius: 0 14px 14px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .song:hover {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: #ffd866;
        }
        .song .title {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }
        .song .author {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        .lyrics-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 35px;
            margin-top: 10px;
        }
        .lyrics-box .big-title {
            font-size: 28px;
            color: #ffd866;
            font-weight: 600;
        }
        .lyrics-box .big-author {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            margin: 4px 0 20px;
        }
        .lyrics-box .text {
            font-size: 17px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.8);
            white-space: pre-wrap;
            font-family: Georgia, serif;
        }

        .page {
            display: block;
        }
        .page.hidden {
            display: none;
        }

        .fade {
            animation: fade 0.3s ease;
        }
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 550px) {
            .header h1 {
                font-size: 26px;
            }
            .row {
                flex-wrap: wrap;
                gap: 6px 12px;
            }
            .time {
                font-size: 18px;
                width: auto;
            }
            .lyrics-box {
                padding: 20px;
            }
            .lyrics-box .big-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>✦ РАСПИСАНИЕ ГИТАРНИКА ✦</h1>
            <p>Вечер выступлений</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Найти исполнителя..." oninput="applyFilter()" />
        </div>

        <!-- ===== ГЛАВНАЯ ===== -->
        <div id="pageMain" class="page">
            <div id="schedule" class="schedule"></div>
        </div>

        <!-- ===== ПЕСНИ ===== -->
        <div id="pageSongs" class="page hidden">
            <button class="back" onclick="goHome()">← Назад к расписанию</button>
            <div id="artistTitle" style="font-size:32px;color:#ffd866;font-weight:700;"></div>
            <div id="songsList"></div>
        </div>

        <!-- ===== ТЕКСТ ===== -->
        <div id="pageLyrics" class="page hidden">
            <button class="back" onclick="goToSongs()">← Назад к песням</button>
            <div class="lyrics-box fade">
                <div class="big-title" id="lyricTitle"></div>
                <div class="big-author" id="lyricAuthor"></div>
                <div class="text" id="lyricText"></div>
            </div>
        </div>

    </div>

    <script>
        // =============================================================
        // ДАННЫЕ
        // =============================================================

        const SCHEDULE = [
            { time: "20:00", name: "Саня Hellraiser Захарчук" },
            { time: "20:15", name: "Рыжкова Екатерина Алексеевна" },
            { time: "20:25", name: "Курносов Владимир Александрович" },
            { time: "20:35", name: "Вера Благовещенская" },
            { time: "20:45", name: "Савватеев Михаил Алексеевич" },
            { time: "21:00", name: "Зильберштейн Арпине + Аракелян Екатерина" },
            { time: "21:15", name: "Ананьев Владислав Антонович" },
            { time: "21:25", name: "Куприянова Софья Андреевна" },
            { time: "21:32", name: "Завадский Дмитрий" },
            { time: "21:45", name: "Каменный Лев (группа)" },
            { time: "22:00", name: "Алан Б" },
            { time: "22:15", name: "Поминов Денис Игоревич" },
            { time: "22:25", name: "ОМБ (Определённо Может Быть)" },
            { time: "22:45", name: "Гельдыев Ахмет" }
        ];

        // =============================================================
        // ПЕСНИ (привязаны по ИМЕНИ исполнителя)
        // =============================================================

        const SONGS = [
            { artist: "Саня Hellraiser Захарчук", title: "Dance Me to the End of Love", author: "Leonard Cohen" },
            { artist: "Саня Hellraiser Захарчук", title: "Tears Don't Fall", author: "Bullet for My Valentine" },
            { artist: "Саня Hellraiser Захарчук", title: "Из окна", author: "Noize MC" },
            { artist: "Саня Hellraiser Захарчук", title: "Морок", author: "Я" },
            { artist: "Гельдыев Ахмет", title: "Мама я люблю", author: "авторская" },
            { artist: "Гельдыев Ахмет", title: "Супермаркет", author: "авторская" },
            { artist: "Гельдыев Ахмет", title: "Курильщикам трудно без плана", author: "авторская" },
            { artist: "Гельдыев Ахмет", title: "Sign of the times", author: "кавер" },
            { artist: "Рыжкова Екатерина Алексеевна", title: "Потерянный рай", author: "Ария" },
            { artist: "Рыжкова Екатерина Алексеевна", title: "Я свободен", author: "Ария" },
            { artist: "Рыжкова Екатерина Алексеевна", title: "Нева", author: "5nizza" },
            { artist: "Курносов Владимир Александрович", title: "Е=mc²", author: "Ундервуд" },
            { artist: "Курносов Владимир Александрович", title: "Гагарин, я Вас любила", author: "Ундервуд" },
            { artist: "Курносов Владимир Александрович", title: "Кукушка", author: "Кино" },
            { artist: "Савватеев Михаил Алексеевич", title: "Марш Небесных Связистов", author: "Олег Медведев" },
            { artist: "Савватеев Михаил Алексеевич", title: "Марафонец", author: "Смешарики" },
            { artist: "Савватеев Михаил Алексеевич", title: "Белое Безмолвие", author: "Высоцкий" },
            { artist: "Савватеев Михаил Алексеевич", title: "Стеклянный Господин", author: "Никитины" },
            { artist: "Ананьев Владислав Антонович", title: "Девочка пай", author: "Михаил Круг" },
            { artist: "Ананьев Владислав Антонович", title: "Мое сердце", author: "Сплин" },
            { artist: "Ананьев Владислав Антонович", title: "Милые зеленые глаза", author: "Муцураев" },
            { artist: "Каменный Лев (группа)", title: "Временно", author: "авторская" },
            { artist: "Каменный Лев (группа)", title: "Теряюсь", author: "авторская" },
            { artist: "Каменный Лев (группа)", title: "Поезда", author: "авторская" },
            { artist: "Зильберштейн Арпине + Аракелян Екатерина", title: "Mer Siro Ashuny", author: "Ruben Hakhverdyan" },
            { artist: "Зильберштейн Арпине + Аракелян Екатерина", title: "Aravind, Arevin", author: "Lava Eli" },
            { artist: "Зильберштейн Арпине + Аракелян Екатерина", title: "Bari Aragil", author: "Serj Tankian" },
            { artist: "Зильберштейн Арпине + Аракелян Екатерина", title: "Ari Erb Ush e", author: "Armine Hayrapetyan" },
            { artist: "Куприянова Софья Андреевна", title: "Young And Beautiful", author: "Lana Del Rey" },
            { artist: "Куприянова Софья Андреевна", title: "Riptide", author: "Vance Joy" },
            { artist: "Алан Б", title: "Свои песни", author: "авторские" },
            { artist: "Вера Благовещенская", title: "Я бью женщин и детей", author: "Валентин Стрыкало" },
            { artist: "Вера Благовещенская", title: "Дешевые драмы", author: "Валентин Стрыкало" },
            { artist: "Вера Благовещенская", title: "Рустэм", author: "Валентин Стрыкало" },
            { artist: "Поминов Денис Игоревич", title: "92", author: "Стрыкало" },
            { artist: "Поминов Денис Игоревич", title: "Улыбнись", author: "Cupsize" },
            { artist: "Поминов Денис Игоревич", title: "Что-то авторское", author: "авторское" },
            { artist: "Завадский Дмитрий", title: "Ля-ля тополя", author: "Би-2" },
            { artist: "Завадский Дмитрий", title: "Чувства", author: "Animal ДжаZ" },
            { artist: "Завадский Дмитрий", title: "Просвистела", author: "ДДТ" },
            { artist: "Сергеев Владимир Алексеевич", title: "Романс-Диктофон", author: "—" },
            { artist: "Сергеев Владимир Алексеевич", title: "Корсары-Йовин", author: "—" },
            { artist: "Сергеев Владимир Алексеевич", title: "Я тебе не верю", author: "Григорий Лепс" },
            { artist: "Капустин Егор Дмитриевич", title: "Весна", author: "4 Позиции Бруно" },
            { artist: "Капустин Егор Дмитриевич", title: "Супермен", author: "КРУПНОГАБАРИТНЫЕ ОТХОДЫ" },
            { artist: "Капустин Егор Дмитриевич", title: "Бетон с молоком", author: "КРУПНОГАБАРИТНЫЕ ОТХОДЫ" },
            { artist: "ОМБ (Определённо Может Быть)", title: "Авторская музыка с площадок", author: "авторская" }
        ];

        // =============================================================
        // КОД
        // =============================================================

        function renderSchedule(filter = '') {
            const container = document.getElementById('schedule');

            const filtered = SCHEDULE.filter(item =>
                item.name.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML =
                    `<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px;">Ничего не найдено</div>`;
                return;
            }

            let html = '';
            filtered.forEach(item => {
                const isGroup = item.name.includes('группа') || item.name.includes('ОМБ');
                html += `
                    <div class="row" onclick="openSongs('${item.name}')">
                        <div class="time">${item.time}</div>
                        <div class="name">${item.name}</div>
                        ${isGroup ? '<span class="badge">★ группа</span>' : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function applyFilter() {
            const val = document.getElementById('searchInput').value;
            renderSchedule(val);
        }

        function goHome() {
            document.getElementById('pageMain').classList.remove('hidden');
            document.getElementById('searchInput').parentElement.style.display = 'block';
            document.getElementById('pageSongs').classList.add('hidden');
            document.getElementById('pageLyrics').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openSongs(artistName) {
            document.getElementById('pageMain').classList.add('hidden');
            document.getElementById('searchInput').parentElement.style.display = 'none';
            document.getElementById('pageSongs').classList.remove('hidden');
            document.getElementById('pageLyrics').classList.add('hidden');

            document.getElementById('artistTitle').textContent = artistName;

            const songs = SONGS.filter(s => s.artist === artistName);

            const list = document.getElementById('songsList');
            if (songs.length === 0) {
                list.innerHTML =
                    `<div style="color:rgba(255,255,255,0.15);padding:20px;">У этого исполнителя пока нет песен</div>`;
                return;
            }

            let html = '';
            songs.forEach((s, i) => {
                html += `
                    <div class="song" onclick="openLyrics('${s.title}', '${s.author}')">
                        <div class="title">${i + 1}. ${s.title}</div>
                        <div class="author">${s.author}</div>
                    </div>
                `;
            });
            list.innerHTML = html;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToSongs() {
            document.getElementById('pageLyrics').classList.add('hidden');
            document.getElementById('pageSongs').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openLyrics(title, author) {
            document.getElementById('pageSongs').classList.add('hidden');
            document.getElementById('pageLyrics').classList.remove('hidden');

            document.getElementById('lyricTitle').textContent = title;
            document.getElementById('lyricAuthor').textContent = author;
            document.getElementById('lyricText').textContent = '📝 Текст песни пока не добавлен.';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // =============================================================
        // ЗАПУСК

        renderSchedule();

        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyFilter();
            }
        });
    </script>
</body>
</html>
